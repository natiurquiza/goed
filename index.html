<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>InspiratED</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
  font-family: 'Poppins', sans-serif;
  background: #eef4f4;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

/* CONTENEDOR */
.container {
  background: white;
  padding: 40px;
  border-radius: 28px;
  width: 820px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.08);
  text-align: center;
}

/* TITULO */
h1 {
  font-size: 34px;
  font-weight: 600;
  margin-bottom: 5px;
}

.subtitle {
  color: #7c8a8a;
  font-size: 14px;
  margin-bottom: 35px;
}

/* TARJETAS */
.cards {
  display: flex;
  gap: 20px;
  margin-bottom: 35px;
}

.card {
  flex: 1;
  border-radius: 22px;
  border: 2px solid #4FD1C5;
  padding: 15px;
  cursor: pointer;
  transition: all 0.25s ease;
  background: #ffffff;
}

.card img {
  width: 100%;
  border-radius: 15px;
}

.card p {
  margin-top: 12px;
  font-weight: 500;
  font-size: 14px;
}

/* HOVER */
.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.08);
}

/* SELECCION */
.card.selected {
  border: 3px solid #ff4fa3;
  background: #fff0f6;
}

/* FORMULARIO */
.form {
  display: flex;
  gap: 15px;
  margin-bottom: 30px;
}

select {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: 2px solid #4FD1C5;
  font-family: 'Poppins';
  font-size: 14px;
  background: white;
  transition: 0.2s;
}

/* HOVER INPUT */
select:hover {
  border-color: #2fb5a8;
}

/* BOTON */
button {
  background: #ff4fa3;
  color: white;
  border: none;
  padding: 16px;
  width: 100%;
  border-radius: 16px;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s;
}

/* HOVER BOTON */
button:hover {
  transform: scale(1.02);
  box-shadow: 0 8px 20px rgba(255,79,163,0.3);
}

/* RESULTADO */
#resultado {
  margin-top: 18px;
  color: #5f6f6f;
  font-size: 14px;
}

</style>
</head>

<body>

<div class="container">

<h1>InspiratED</h1>
<p class="subtitle">Explorá proyectos de Educación Digital alineados al diseño curricular</p>

<!-- TARJETAS -->
<div class="cards">

<div class="card" onclick="seleccionar(this,'alfabetizaciones')">
  <img src="https://i.imgur.com/HCbcgiO.png">
  <p>Alfabetizaciones múltiples</p>
</div>

<div class="card" onclick="seleccionar(this,'ciudadania')">
  <img src="https://i.imgur.com/XtP23Pr.png">
  <p>Ciudadanía digital</p>
</div>

<div class="card" onclick="seleccionar(this,'computacional')">
  <img src="https://i.imgur.com/CiCnCgu.png">
  <p>Pensamiento computacional</p>
</div>

</div>

<!-- FORMULARIO -->
<div class="form">

<select id="grado">
  <option value="">Grado</option>
  <option>1°</option>
  <option>2°</option>
  <option>3°</option>
  <option>4°</option>
  <option>5°</option>
  <option>6°</option>
  <option>7°</option>
</select>

<select id="modalidad">
  <option value="">Modalidad</option>
  <option>Común</option>
  <option>Especial</option>
</select>

<select id="area">
  <option value="">Área</option>
  <option>Lengua</option>
  <option>Matemáticas</option>
  <option>Conocimiento del mundo</option>
  <option>Tecnología</option>
  <option>Inglés</option>
  <option>Todas</option>
</select>

</div>

<button onclick="buscar()">Buscar proyectos</button>

<p id="resultado"></p>

</div>

<script>

let ejeSeleccionado = "";

function seleccionar(elemento, eje) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  elemento.classList.add('selected');
  ejeSeleccionado = eje;
}

<script>

let ejeSeleccionado = "";

function seleccionar(elemento, eje) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  elemento.classList.add('selected');
  ejeSeleccionado = eje;
}

async function buscar() {

  const grado = document.getElementById("grado").value;
  const modalidad = document.getElementById("modalidad").value;
  const area = document.getElementById("area").value;

  if (!ejeSeleccionado) {
    alert("Seleccioná un eje");
    return;
  }

  const url = "https://docs.google.com/spreadsheets/d/1HvV3mMCFMttcT2aP1TZbtjblY6CAhXa7Y_1nUO2Sekk//gviz/tq?tqx=out:json
";

  const response = await fetch(url);
  const text = await response.text();

  const json = JSON.parse(text.substr(47).slice(0, -2));
  const rows = json.table.rows;

  let resultadoHTML = "";

  rows.forEach(r => {

    const eje = r.c[0]?.v;
    const g = r.c[1]?.v;
    const m = r.c[2]?.v;
    const a = r.c[3]?.v;
    const titulo = r.c[4]?.v;
    const link = r.c[5]?.v;

    if (
      eje === ejeSeleccionado &&
      g === grado &&
      m === modalidad &&
      (a === area || area === "Todas")
    ) {
      resultadoHTML += `
        <div>
          <p><strong>${titulo}</strong></p>
          <a href="${link}" target="_blank">Ver proyecto</a>
        </div>
      `;
    }
  });

  if (resultadoHTML === "") {
    resultadoHTML = "No se encontraron proyectos.";
  }

  document.getElementById("resultado").innerHTML = resultadoHTML;
}

</script>

  document.getElementById("resultado").innerText =
    "Buscando: " + ejeSeleccionado +
    " | " + grado +
    " | " + modalidad +
    " | " + area;
}

</script>

</body>
</html>
