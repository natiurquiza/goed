<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>InspiratED</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
  font-family: 'Poppins', sans-serif;
  background: #eef4f4;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  background: white;
  padding: 40px;
  border-radius: 28px;
  width: 820px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.08);
  text-align: center;
}

h1 {
  font-size: 34px;
  font-weight: 600;
}

.subtitle {
  color: #7c8a8a;
  font-size: 14px;
  margin-bottom: 35px;
}

/* TARJETAS EJES */
.cards {
  display: flex;
  gap: 20px;
  margin-bottom: 35px;
}

.card {
  flex: 1;
  border-radius: 22px;
  border: 2px solid #4FD1C5;
  padding: 15px;
  cursor: pointer;
  transition: 0.25s;
}

.card img {
  width: 100%;
  border-radius: 15px;
}

.card.selected {
  border: 3px solid #ff4fa3;
  background: #fff0f6;
}

/* FORMULARIO */
.form {
  display: flex;
  gap: 15px;
  margin-bottom: 30px;
}

select {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: 2px solid #4FD1C5;
  font-family: 'Poppins';
}

/* BOTÓN */
button {
  background: #ff4fa3;
  color: white;
  border: none;
  padding: 16px;
  width: 100%;
  border-radius: 16px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.02);
}

/* RESULTADOS */
#contador {
  margin-top: 20px;
  font-size: 14px;
  color: #7c8a8a;
}

.resultado-card {
  margin-top: 15px;
  padding: 15px;
  border-radius: 14px;
  border: 1px solid #e0e0e0;
  text-align: left;
  transition: 0.2s;
}

.resultado-card:hover {
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
}

.resultado-card a {
  display: inline-block;
  margin-top: 8px;
  color: #ff4fa3;
  font-weight: 500;
  text-decoration: none;
}

.resultado-card a:hover {
  text-decoration: underline;
}

</style>
</head>

<body>

<div class="container">

<h1>InspiratED</h1>
<p class="subtitle">Explorá proyectos de Educación Digital alineados al diseño curricular</p>

<div class="cards">

<div class="card" onclick="seleccionar(this,'alfabetizaciones')">
  <img src="https://i.imgur.com/HCbcgiO.png">
  <p>Alfabetizaciones múltiples</p>
</div>

<div class="card" onclick="seleccionar(this,'ciudadania')">
  <img src="https://i.imgur.com/XtP23Pr.png">
  <p>Ciudadanía digital</p>
</div>

<div class="card" onclick="seleccionar(this,'computacional')">
  <img src="https://i.imgur.com/CiCnCgu.png">
  <p>Pensamiento computacional</p>
</div>

</div>

<div class="form">

<select id="grado">
  <option value="">Grado</option>
  <option>1°</option>
  <option>2°</option>
  <option>3°</option>
  <option>4°</option>
  <option>5°</option>
  <option>6°</option>
  <option>7°</option>
</select>

<select id="modalidad">
  <option value="">Modalidad</option>
  <option>Común</option>
  <option>Especial</option>
</select>

<select id="area">
  <option value="">Área</option>
  <option>Lengua</option>
  <option>Matemáticas</option>
  <option>Conocimiento del mundo</option>
  <option>Tecnología</option>
  <option>Inglés</option>
  <option>Todas</option>
</select>

</div>

<button onclick="buscar()">Buscar proyectos</button>

<div id="contador"></div>
<div id="resultado"></div>

</div>

<script>

let ejeSeleccionado = "";

function seleccionar(elemento, eje) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  elemento.classList.add('selected');
  ejeSeleccionado = eje;
}

async function buscar() {

  const grado = document.getElementById("grado").value;
  const modalidad = document.getElementById("modalidad").value;
  const area = document.getElementById("area").value;

  if (!ejeSeleccionado) {
    alert("Seleccioná un eje");
    return;
  }

  const url = "https://docs.google.com/spreadsheets/d/1HvV3mMCFMttcT2aP1TZbtjblY6CAhXa7Y_1nUO2Sekk/gviz/tq?tqx=out:json";

  const response = await fetch(url);
  const text = await response.text();

  const json = JSON.parse(text.substr(47).slice(0, -2));
  const rows = json.table.rows;

  let resultadoHTML = "";
  let contador = 0;

  rows.forEach(r => {

    const eje = r.c[0]?.v?.toString().toLowerCase().trim();
    const g = r.c[1]?.v?.toString().trim();
    const m = r.c[2]?.v?.toString().trim();
    const a = r.c[3]?.v?.toString().trim();
    const titulo = r.c[4]?.v;
    const link = r.c[5]?.v;

    if (
      eje && eje.includes(ejeSeleccionado) &&
      g === grado &&
      m === modalidad &&
      (a === area || area === "Todas")
    ) {
      contador++;

      resultadoHTML += `
        <div class="resultado-card">
          <p><strong>${titulo}</strong></p>
          <a href="${link}" target="_blank">Ver proyecto</a>
        </div>
      `;
    }
  });

  if (contador === 0) {
    document.getElementById("contador").innerText = "";
    resultadoHTML = "No se encontraron proyectos.";
  } else {
    document.getElementById("contador").innerText = contador + " proyecto(s) encontrados";
  }

  document.getElementById("resultado").innerHTML = resultadoHTML;
}

</script>

</body>
</html>
