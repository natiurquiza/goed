<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>InspiratED</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
  font-family: 'Poppins', sans-serif;
  background: #eef4f4;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
}

.container {
  background: white;
  padding: 40px;
  border-radius: 28px;
  width: 820px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.08);
  text-align: center;
}

h1 {
  font-size: 34px;
  font-weight: 600;
}

.subtitle {
  color: #7c8a8a;
  font-size: 14px;
  margin-bottom: 35px;
}

.cards {
  display: flex;
  gap: 20px;
  margin-bottom: 35px;
}

.card {
  flex: 1;
  border-radius: 22px;
  border: 2px solid #4FD1C5;
  padding: 15px;
  cursor: pointer;
}

.card img {
  width: 100%;
  border-radius: 15px;
}

.card.selected {
  border: 3px solid #ff4fa3;
  background: #fff0f6;
}

.form {
  display: flex;
  gap: 15px;
  margin-bottom: 30px;
}

select {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: 2px solid #4FD1C5;
  font-family: 'Poppins';
}

button {
  background: #ff4fa3;
  color: white;
  border: none;
  padding: 16px;
  width: 100%;
  border-radius: 16px;
  font-size: 16px;
  cursor: pointer;
}

/* RESULTADOS */

.resultado-card {
  margin-top: 20px;
  padding: 20px;
  border-radius: 18px;
  border: 2px solid #4FD1C5;
  background: #f9ffff;
  text-align: left;
}

.resultado-titulo {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 12px;
}

/* CONTENEDOR BOTONES */
.botones {
  display: flex;
  gap: 10px;
  align-items: center;
}

/* BOTONES */
.btn-proyecto {
  background: #4FD1C5;
  color: white;
  padding: 10px 16px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 500;
}

.btn-ia {
  border: 2px solid #4FD1C5;
  color: #4FD1C5;
  padding: 10px 16px;
  border-radius: 10px;
  font-weight: 500;
  cursor: pointer;
  background: white;
}

.btn-ia:hover {
  background: #4FD1C5;
  color: white;
}

</style>
</head>

<body>

<div class="container">

<h1>InspiratED</h1>
<p class="subtitle">Explorá proyectos de Educación Digital alineados al diseño curricular</p>

<div class="cards">

<div class="card" onclick="seleccionar(this,'alfabetizaciones')">
  <img src="https://i.imgur.com/HCbcgiO.png">
  <p>Alfabetizaciones múltiples</p>
</div>

<div class="card" onclick="seleccionar(this,'ciudadania')">
  <img src="https://i.imgur.com/XtP23Pr.png">
  <p>Ciudadanía digital</p>
</div>

<div class="card" onclick="seleccionar(this,'computacional')">
  <img src="https://i.imgur.com/CiCnCgu.png">
  <p>Pensamiento computacional</p>
</div>

</div>

<div class="form">

<select id="grado">
  <option value="">Grado</option>
  <option>1°</option>
  <option>2°</option>
  <option>3°</option>
  <option>4°</option>
  <option>5°</option>
  <option>6°</option>
  <option>7°</option>
</select>

<select id="modalidad">
  <option value="">Modalidad</option>
  <option>Común</option>
  <option>Especial</option>
</select>

<select id="area">
  <option value="">Área</option>
  <option>Lengua</option>
  <option>Matemáticas</option>
  <option>Conocimiento del mundo</option>
  <option>Tecnología</option>
  <option>Inglés</option>
  <option>Todas</option>
</select>

</div>

<button onclick="buscar()">Buscar proyectos</button>

<div id="resultado"></div>

</div>

<script>

let ejeSeleccionado = "";

function seleccionar(elemento, eje) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  elemento.classList.add('selected');
  ejeSeleccionado = eje;
}

function copiarYabrir(prompt) {

  navigator.clipboard.writeText(prompt);

  alert("✅ Prompt copiado.\n\n1. Se abrirá el GPT\n2. Pegá el prompt\n3. Descargá o copiá el proyecto y subilo al GPT para potenciarlo.");

  window.open("https://chatgpt.com/g/g-69f7660a30988191bcb0501d3a516bd8-inspirated-adaptador-de-proyectos", "_blank");
}

async function buscar() {

  const grado = document.getElementById("grado").value;
  const modalidad = document.getElementById("modalidad").value;
  const area = document.getElementById("area").value;

  const url = "https://docs.google.com/spreadsheets/d/1HvV3mMCFMttcT2aP1TZbtjblY6CAhXa7Y_1nUO2Sekk/gviz/tq?tqx=out:json";

  const response = await fetch(url);
  const text = await response.text();

  const json = JSON.parse(text.substr(47).slice(0, -2));
  const rows = json.table.rows;

  let resultadoHTML = "";

  rows.forEach(r => {

    const eje = r.c[0]?.v?.toString().toLowerCase().trim();
    const g = r.c[1]?.v?.toString().trim();
    const m = r.c[2]?.v?.toString().trim();
    const a = r.c[3]?.v?.toString().trim();
    const titulo = r.c[4]?.v;
    const link = r.c[5]?.v;

    if (
      eje && eje.includes(ejeSeleccionado) &&
      g === grado &&
      m === modalidad &&
      (a === area || area === "Todas")
    ) {

      const prompt = 
`Adaptá el siguiente proyecto educativo:

Proyecto: ${titulo}
Grado: ${g}
Modalidad: ${m}
Área: ${a}

Proponé:
- objetivos claros
- actividades paso a paso
- integración de tecnología
- estrategias inclusivas
- evaluación`;

      resultadoHTML += `
        <div class="resultado-card">
          <div class="resultado-titulo">${titulo}</div>

          <div class="botones">
            <a class="btn-proyecto" href="${link}" target="_blank">Ver proyecto</a>

            <button class="btn-ia" onclick="copiarYabrir(\`${prompt}\`)">
              Potenciar con IA
            </button>
          </div>

        </div>
      `;
    }
  });

  document.getElementById("resultado").innerHTML = resultadoHTML;
}

</script>

</body>
</html>
