<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>InspiratED</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
  font-family: 'Poppins', sans-serif;
  background: #eef4f4;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
}

.container {
  background: white;
  padding: 40px;
  border-radius: 28px;
  width: 820px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.08);
  text-align: center;
  animation: fadeIn 0.6s ease;
}

h1 {
  font-size: 34px;
  margin-bottom: 10px;
}

.subtitle {
  color: #7c8a8a;
  margin-bottom: 35px;
}

/* TARJETAS EJES */
.cards {
  display: flex;
  gap: 20px;
  margin-bottom: 35px;
}

.card {
  flex: 1;
  border-radius: 22px;
  border: 2px solid #4FD1C5;
  padding: 15px;
  cursor: pointer;
  transition: all 0.25s ease;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.card.selected {
  border: 3px solid #ff4fa3;
  background: #fff0f6;
}

/* FORM */
.form {
  display: flex;
  gap: 15px;
  margin-bottom: 30px;
}

select {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: 2px solid #4FD1C5;
  transition: 0.2s;
}

select:focus {
  outline: none;
  border-color: #ff4fa3;
}

/* BOTÓN BUSCAR */
button.buscar {
  background: #ff4fa3;
  color: white;
  border: none;
  padding: 16px;
  width: 100%;
  border-radius: 16px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.25s;
}

button.buscar:hover {
  transform: scale(1.02);
  box-shadow: 0 8px 20px rgba(255,79,163,0.3);
}

/* RESULTADOS */
.resultado-card {
  margin-top: 20px;
  padding: 20px;
  border-radius: 18px;
  border: 2px solid #4FD1C5;
  background: #f9ffff;
  text-align: left;
  transition: 0.25s;
  animation: fadeUp 0.4s ease;
}

.resultado-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.resultado-titulo {
  font-weight: 600;
  margin-bottom: 12px;
  font-size: 18px;
}

/* BOTONES */
.botones {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-top: 10px;
}

.btn-proyecto {
  background: #4FD1C5;
  color: white;
  padding: 10px 18px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 500;
  white-space: nowrap;
  transition: 0.2s;
}

.btn-proyecto:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 15px rgba(79,209,197,0.4);
}

.btn-ia {
  border: 2px solid #4FD1C5;
  color: #4FD1C5;
  padding: 10px 18px;
  border-radius: 10px;
  font-weight: 500;
  cursor: pointer;
  background: white;
  white-space: nowrap;
  transition: 0.2s;
}

.btn-ia:hover {
  background: #4FD1C5;
  color: white;
  transform: translateY(-2px);
  box-shadow: 0 6px 15px rgba(79,209,197,0.4);
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  justify-content: center;
  align-items: center;
  animation: fadeIn 0.3s ease;
}

.modal-content {
  background: white;
  padding: 30px;
  border-radius: 18px;
  width: 350px;
  text-align: center;
  animation: scaleIn 0.3s ease;
}

.modal h3 {
  margin-bottom: 10px;
}

.modal p {
  font-size: 14px;
  color: #555;
  margin-bottom: 20px;
}

.modal button {
  background: #4FD1C5;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 10px;
  cursor: pointer;
}

/* ANIMACIONES */
@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}

@keyframes fadeUp {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}

@keyframes scaleIn {
  from {transform: scale(0.9); opacity:0;}
  to {transform: scale(1); opacity:1;}
}

</style>
</head>

<body>

<div class="container">

<h1>InspiratED</h1>
<p class="subtitle">Explorá proyectos de Educación Digital alineados al diseño curricular</p>

<div class="cards">
<div class="card" onclick="seleccionar(this,'alfabetizaciones')">Alfabetizaciones</div>
<div class="card" onclick="seleccionar(this,'ciudadania')">Ciudadanía</div>
<div class="card" onclick="seleccionar(this,'computacional')">Computacional</div>
</div>

<div class="form">
<select id="grado">
<option>1°</option><option>2°</option><option>3°</option>
</select>

<select id="modalidad">
<option>Común</option><option>Especial</option>
</select>

<select id="area">
<option>Lengua</option><option>Todas</option>
</select>
</div>

<button class="buscar" onclick="buscar()">Buscar proyectos</button>

<div id="resultado"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>🚀 Potenciar con IA</h3>
    <p>
      El prompt fue copiado.<br><br>
      1. Se abrirá el GPT<br>
      2. Pegá el prompt<br>
      3. Descargá o copiá el proyecto y subilo
    </p>
    <button onclick="irGPT()">Continuar</button>
  </div>
</div>

<script>

let ejeSeleccionado = "";

function seleccionar(el, eje) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  ejeSeleccionado = eje;
}

function copiarYabrir(prompt) {
  navigator.clipboard.writeText(prompt);
  document.getElementById("modal").style.display = "flex";
}

function irGPT() {
  window.open("https://chatgpt.com/g/g-69f7660a30988191bcb0501d3a516bd8-inspirated-adaptador-de-proyectos", "_blank");
  document.getElementById("modal").style.display = "none";
}

async function buscar() {

  const url = "https://docs.google.com/spreadsheets/d/1HvV3mMCFMttcT2aP1TZbtjblY6CAhXa7Y_1nUO2Sekk/gviz/tq?tqx=out:json";

  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substr(47).slice(0, -2));
  const rows = json.table.rows;

  let html = "";

  rows.forEach(r => {

    const titulo = r.c[4]?.v;
    const link = r.c[5]?.v;

    const prompt = `Adaptá este proyecto: ${titulo}`;

    html += `
      <div class="resultado-card">
        <div class="resultado-titulo">${titulo}</div>

        <div class="botones">
          <a class="btn-proyecto" href="${link}" target="_blank">Ver proyecto</a>

          <button class="btn-ia" onclick="copiarYabrir(\`${prompt}\`)">
            Potenciar con IA
          </button>
        </div>

      </div>
    `;
  });

  document.getElementById("resultado").innerHTML = html;
}

</script>

</body>
</html>
